name: Build and test

on:
  push:
    tags:
      - 'v*'
      - 'build*'
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.17

    - name: Unit tests
      run: |
        go mod tidy
        go test ./... -v
