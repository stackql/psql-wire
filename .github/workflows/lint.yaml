name: Linting checks

on:
  push:
    tags:
      - 'v*'
      - 'build*'
      - 'lint*'
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.17

    - name: Restore bin
      uses: actions/cache@v2
      with:
        path: ./bin
        key: ${{ runner.os }}-bin-${{ hashFiles('**/go.sum') }}

    - name: Linting
      run: make lint
    
    - name: Cache bin
      uses: actions/cache@v2
      with:
        path: ./bin
        key: ${{ runner.os }}-bin-${{ hashFiles('**/go.sum') }}
